description: My clean model
time_units: generations
defaults:
  epoch:
    start_size: 10000
    end_size: 10000
    size_function: constant
demes:
  - name: X
    epochs:
      - end_time: 3000  # split at 3000 generations ago
  - name: A
    ancestors: [X]
    epochs:
      - end_time: 0
        start_size: 8000
        end_size: 8000
  - name: B
    ancestors: [X]
    epochs:
      - end_time: 0
        start_size: 8000
        end_size: 8000
migrations:
  - source: A
    dest: B
    rate: 1e-4
  - source: B
    dest: A
    rate: 1e-4